name: XiangqiAssistant

options:
  bundleIdPrefix: com.xiangqi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager.git
    from: 1.24.2

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    # Keep a persistent local identity.  Ad-hoc signing changes the app's
    # designated requirement on every build, which makes macOS ask again for
    # Screen Recording and Accessibility permission.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Xiangqi Pilot Dedicated Signing"
    PRODUCT_BUNDLE_IDENTIFIER: com.xiangqi.XiangqiAssistant.TheOne
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    INFOPLIST_FILE: Info.plist
    CODE_SIGN_ENTITLEMENTS: XiangqiAssistant.entitlements

targets:
  XiangqiAssistant:
    type: application
    platform: macOS
    sources:
      - path: Sources/XiangqiAssistant
        excludes:
          - "Resources/**"
          # Monitoring/recommendation build: mouse-control code is deliberately
          # excluded so this app cannot click or move pieces.
          - "UI/AutoPlayManager.swift"
      # Keep this protocol helper explicit: it is also referenced by the
      # recognition target and must remain a member of the app target.
      - path: Sources/XiangqiAssistant/Engine/UCIMove.swift
    resources:
      - Sources/XiangqiAssistant/Resources/Engine/pikafish.nnue
      - Sources/XiangqiAssistant/Resources/Engine/pikafish-apple-silicon
      - Sources/XiangqiAssistant/Resources/Recognition/TheOne1006/layout_recognition.onnx
      - Sources/XiangqiAssistant/Resources/Recognition/TheOne1006/pose.onnx
      - Sources/XiangqiAssistant/Resources/OpeningBook/opening_book_v1.json
    dependencies:
      - package: onnxruntime
        product: onnxruntime
    preBuildScripts:
      - name: Bundle Pikafish Engine
        script: |
          ENGINE_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Engine"
          mkdir -p "$ENGINE_DIR"
          cp "${SRCROOT}/Sources/XiangqiAssistant/Resources/Engine/pikafish.nnue" "$ENGINE_DIR/"
          cp "${SRCROOT}/Sources/XiangqiAssistant/Resources/Engine/pikafish-apple-silicon" "$ENGINE_DIR/"
          chmod +x "$ENGINE_DIR/pikafish-apple-silicon"
        basedOnDependencyAnalysis: false
      - name: Bundle TheOne1006 Models
        script: |
          MODEL_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Recognition/TheOne1006"
          mkdir -p "$MODEL_DIR"
          cp "${SRCROOT}/Sources/XiangqiAssistant/Resources/Recognition/TheOne1006/layout_recognition.onnx" "$MODEL_DIR/"
          cp "${SRCROOT}/Sources/XiangqiAssistant/Resources/Recognition/TheOne1006/pose.onnx" "$MODEL_DIR/"
        basedOnDependencyAnalysis: false
      - name: Bundle Offline Opening Book
        script: |
          BOOK_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/OpeningBook"
          mkdir -p "$BOOK_DIR"
          cp "${SRCROOT}/Sources/XiangqiAssistant/Resources/OpeningBook/opening_book_v1.json" "$BOOK_DIR/"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xiangqi.XiangqiAssistant.TheOne
        CODE_SIGN_ENTITLEMENTS: XiangqiAssistant.entitlements
